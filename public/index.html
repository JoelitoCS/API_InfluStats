<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - InfluStats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-requirements {
            background: #f5f5f5;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .requirement.valid {
            color: #4caf50;
        }

        .requirement.invalid {
            color: #f44336;
        }

        .requirement::before {
            content: "✗";
            display: inline-block;
            margin-right: 8px;
            font-weight: bold;
        }

        .requirement.valid::before {
            content: "✓";
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .token-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 100px;
            overflow-y: auto;
        }

        .spinner {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            margin: 0 2px;
            animation: spin 0.8s infinite;
        }

        @keyframes spin {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>InfluStats</h1>
            <p>Crea tu cuenta para gestionar tus perfiles</p>
        </div>

        <div id="alerta" class="alert"></div>

        <form id="registroForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        Mínimo 8 caracteres
                    </div>
                    <div class="requirement" id="req-uppercase">
                        Contiene mayúsculas
                    </div>
                    <div class="requirement" id="req-lowercase">
                        Contiene minúsculas
                    </div>
                    <div class="requirement" id="req-number">
                        Contiene números
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirmar Contraseña</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Confirma tu contraseña" required>
                <div id="passwordMatch" style="margin-top: 8px; font-size: 12px;"></div>
            </div>

            <button type="submit" id="registroBtn">Crear Cuenta</button>
        </form>

        <div id="tokenDisplay" style="display: none;">
            <h3 style="margin-top: 20px; font-size: 14px; color: #333;">Tu Token JWT:</h3>
            <div class="token-display" id="tokenText"></div>
        </div>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="#" onclick="mostrarLogin()">Inicia sesión</a>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
